<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto casa aspen</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <div class="comparison" id="comparison">
            <img src="img/Imagem Sketchup - Casa Aspen 9x16.png" alt="Imagem antes" class="comparison-image img-base" draggable="false">

            <div class="overlay" id="overlay">
                <img src="img/Render proporção vídeo 9x16 Feed.png" alt="Imagem depois" class="comparison-image img-top" draggable="false">
            </div>

            <div class="handle" id="handle" aria-hidden="true">
                <div class="circle">
                    <span class="arrows">&larr; &rarr;</span>
                    <span>Arraste</span>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>

</body>
</html>
